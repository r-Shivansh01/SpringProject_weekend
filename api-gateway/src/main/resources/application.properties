spring.application.name=API-GATEWAY

server.port=8080


# ===============================
# GATEWAY
# ===============================

# Route definitions live in GatewayRoutesConfig.java (Java config) rather than
# here, so the JWT-validation filter can be attached to each protected route
# individually. This property just disables the automatic "one route per
# Eureka service" discovery locator, since routes are defined explicitly.

spring.cloud.gateway.discovery.locator.enabled=false

spring.cloud.gateway.httpclient.connect-timeout=5000

spring.cloud.gateway.httpclient.response-timeout=10s


# ===============================
# AUTH INTEGRATION
# ===============================

# Logical Eureka service id of auth-service - resolved via load-balanced WebClient.
auth.service-id=AUTH-SERVICE

auth.validate-path=/auth/validate


# ===============================
# EUREKA CLIENT
# ===============================

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.client.register-with-eureka=true

eureka.client.fetch-registry=true

eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
eureka.instance.instance-id=localhost:${server.port}
eureka.instance.status-page-url-path=/


# ===============================
# ACTUATOR
# ===============================

management.endpoints.web.exposure.include=health,info,gateway

management.endpoint.health.show-details=always


# ===============================
# APPLICATION INFO
# ===============================

info.app.name=MediFlow API Gateway

info.app.description=Single entry point routing to all MediFlow microservices, enforcing JWT auth via auth-service

info.app.version=1.0.0

management.info.env.enabled=true


# ===============================
# LOGGING (helpful while wiring routes up for the first time)
# ===============================

logging.level.org.springframework.cloud.gateway=INFO
