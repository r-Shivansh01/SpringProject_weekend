<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MediFlow · Prescription Service</title>
<style>
  :root{--accent:#16a34a;--accent-dark:#15803d;--accent-light:#f0fdf4;--bg:#f7fdf9;--text:#14251a;--muted:#6b8578;--card:#ffffff;--border:#bbf7d0;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);}
  header{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;padding:22px 32px;display:flex;align-items:center;gap:14px;box-shadow:0 2px 10px rgba(22,163,74,.25);}
  header .icon{font-size:32px;}
  header h1{margin:0;font-size:22px;font-weight:600;}
  header p{margin:2px 0 0;font-size:13px;opacity:.9;}
  main{max-width:1200px;margin:0 auto;padding:28px 20px 60px;}
  .grid{display:grid;grid-template-columns:360px 1fr;gap:24px;align-items:start;}
  @media (max-width:880px){.grid{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .card h2{margin:0 0 16px;font-size:16px;color:var(--accent-dark);}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 4px;}
  input,textarea{width:100%;padding:9px 10px;border:1px solid #bbf7d0;border-radius:8px;font-size:14px;font-family:inherit;}
  input:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(22,163,74,.15);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .btn{margin-top:18px;width:100%;padding:11px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;font-size:14px;cursor:pointer;}
  .btn:hover{background:var(--accent-dark);}
  .list{display:flex;flex-direction:column;gap:14px;}
  .rx-card{border:1px solid var(--border);border-radius:12px;padding:16px 18px;background:#fdfffe;}
  .rx-head{display:flex;justify-content:space-between;align-items:flex-start;}
  .rx-head h3{margin:0;font-size:14px;color:var(--accent-dark);}
  .rx-head .date{font-size:11px;color:var(--muted);}
  .rx-meta{font-size:12px;color:var(--muted);margin:4px 0 10px;}
  .rx-field{margin-top:8px;}
  .rx-field .k{font-size:11px;font-weight:700;color:var(--accent-dark);text-transform:uppercase;letter-spacing:.03em;}
  .rx-field .v{font-size:13px;margin-top:2px;white-space:pre-wrap;}
  .icon-btn{border:none;background:none;cursor:pointer;font-size:15px;padding:4px 6px;border-radius:6px;}
  .icon-btn.del:hover{background:#fee2e2;}
  .empty{padding:30px;text-align:center;color:var(--muted);font-size:13px;}
  .status-msg{margin-top:12px;font-size:13px;padding:10px 12px;border-radius:8px;display:none;}
  .status-msg.err{background:#fee2e2;color:#991b1b;display:block;}
  .status-msg.ok{background:#dcfce7;color:#166534;display:block;}
  .count{color:var(--muted);font-size:12px;font-weight:500;}
  .hint{font-size:11px;color:var(--muted);margin-top:4px;}
</style>
<script src="mediflow-nav.js"></script>
</head>
<body>
<header>
  <div class="icon">💊</div>
  <div>
    <h1>Prescription Service</h1>
    <p>MediFlow · Prescription Management Microservice · port 8084</p>
  </div>
</header>
<main>
  <div class="grid">
    <div class="card">
      <h2>New Prescription</h2>
      <form id="rxForm">
        <label>Appointment ID</label>
        <input type="number" id="appointmentId" required placeholder="1">
        <div class="hint">Look up at localhost:8083/appointments</div>
        <div class="row2">
          <div>
            <label>Patient ID</label>
            <input type="number" id="patientId" required placeholder="1">
          </div>
          <div>
            <label>Doctor ID</label>
            <input type="number" id="doctorId" required placeholder="1">
          </div>
        </div>
        <label>Diagnosis</label>
        <textarea id="diagnosis" rows="2" required placeholder="Seasonal flu"></textarea>
        <label>Medicines</label>
        <textarea id="medicines" rows="2" required placeholder="Paracetamol 500mg, Cetirizine 10mg"></textarea>
        <label>Dosage</label>
        <textarea id="dosage" rows="2" required placeholder="Paracetamol: 1 tab twice daily"></textarea>
        <label>Instructions</label>
        <textarea id="instructions" rows="2" required placeholder="Take after meals. Drink plenty of fluids."></textarea>
        <button type="submit" class="btn">Save Prescription</button>
      </form>
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <div class="card">
      <h2 style="display:flex;justify-content:space-between;align-items:center;">
        <span>Prescriptions</span><span class="count" id="countLabel"></span>
      </h2>
      <div class="list" id="rxList"></div>
      <div class="empty" id="emptyMsg" style="display:none">No prescriptions yet. Add one on the left.</div>
    </div>
  </div>
</main>

<script>
const API = '/prescriptions';
const form = document.getElementById('rxForm');
const rxList = document.getElementById('rxList');
const statusMsg = document.getElementById('statusMsg');

function showMsg(text, ok){
  statusMsg.textContent = text;
  statusMsg.className = 'status-msg ' + (ok ? 'ok' : 'err');
  setTimeout(()=>{statusMsg.className='status-msg';}, 4000);
}

async function loadPrescriptions(){
  try{
    const res = await fetch(API);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    document.getElementById('countLabel').textContent = data.length + (data.length===1?' record':' records');
    document.getElementById('emptyMsg').style.display = data.length ? 'none':'block';
    rxList.innerHTML = data.map(r => `
      <div class="rx-card">
        <div class="rx-head">
          <div>
            <h3>#${r.id} — ${r.patientName || 'Patient #'+r.patientId}</h3>
            <div class="rx-meta">Dr. ${r.doctorName || '#'+r.doctorId} ${r.doctorSpecialization? '· '+r.doctorSpecialization:''} · Appointment #${r.appointmentId}</div>
          </div>
          <div>
            <span class="date">${r.prescriptionDate||''}</span>
            <button class="icon-btn del" title="Delete" onclick="deleteRx(${r.id})">🗑️</button>
          </div>
        </div>
        <div class="rx-field"><div class="k">Diagnosis</div><div class="v">${r.diagnosis}</div></div>
        <div class="rx-field"><div class="k">Medicines</div><div class="v">${r.medicines}</div></div>
        <div class="rx-field"><div class="k">Dosage</div><div class="v">${r.dosage}</div></div>
        <div class="rx-field"><div class="k">Instructions</div><div class="v">${r.instructions}</div></div>
      </div>`).join('');
  }catch(e){
    showMsg('Could not load prescriptions — is prescription-service running? ('+e.message+')', false);
  }
}

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const payload = {
    appointmentId: parseInt(document.getElementById('appointmentId').value),
    patientId: parseInt(document.getElementById('patientId').value),
    doctorId: parseInt(document.getElementById('doctorId').value),
    diagnosis: document.getElementById('diagnosis').value,
    medicines: document.getElementById('medicines').value,
    dosage: document.getElementById('dosage').value,
    instructions: document.getElementById('instructions').value
  };
  try{
    const res = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({message:res.statusText}));
      throw new Error(err.message || 'Save failed');
    }
    showMsg('Prescription saved', true);
    form.reset();
    loadPrescriptions();
  }catch(e){ showMsg(e.message, false); }
});

async function deleteRx(id){
  if(!confirm('Delete prescription #'+id+'?')) return;
  try{
    const res = await fetch(`${API}/${id}`, {method:'DELETE'});
    if(!res.ok) throw new Error('Delete failed');
    showMsg('Prescription deleted', true);
    loadPrescriptions();
  }catch(e){ showMsg(e.message, false); }
}

loadPrescriptions();
</script>
</body>
</html>
