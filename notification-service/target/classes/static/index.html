<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MediFlow · Notification Service</title>
<style>
  :root{--accent:#e11d48;--accent-dark:#be123c;--accent-light:#fff1f2;--bg:#fffafa;--text:#291418;--muted:#8a6b70;--card:#ffffff;--border:#fecdd3;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);}
  header{background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;padding:22px 32px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 10px rgba(225,29,72,.25);}
  header .left{display:flex;align-items:center;gap:14px;}
  header .icon{font-size:32px;}
  header h1{margin:0;font-size:22px;font-weight:600;}
  header p{margin:2px 0 0;font-size:13px;opacity:.9;}
  header select{padding:8px 10px;border-radius:8px;border:none;font-size:13px;}
  main{max-width:1200px;margin:0 auto;padding:28px 20px 60px;}
  .grid{display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start;}
  @media (max-width:860px){.grid{grid-template-columns:1fr;}}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .card h2{margin:0 0 16px;font-size:16px;color:var(--accent-dark);}
  label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:12px 0 4px;}
  input,select,textarea{width:100%;padding:9px 10px;border:1px solid #fecdd3;border-radius:8px;font-size:14px;font-family:inherit;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(225,29,72,.15);}
  .btn{margin-top:18px;width:100%;padding:11px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;font-size:14px;cursor:pointer;}
  .btn:hover{background:var(--accent-dark);}
  .hint{font-size:11px;color:var(--muted);margin-top:4px;}
  .list{display:flex;flex-direction:column;gap:10px;}
  .n-card{border:1px solid var(--border);border-radius:12px;padding:14px 16px;background:#fffdfd;display:flex;gap:12px;align-items:flex-start;}
  .n-type{font-size:22px;line-height:1;padding-top:2px;}
  .n-body{flex:1;}
  .n-top{display:flex;justify-content:space-between;align-items:center;}
  .n-subject{font-weight:700;font-size:13px;}
  .n-msg{font-size:13px;color:#4a2f34;margin:4px 0;}
  .n-meta{font-size:11px;color:var(--muted);}
  .badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;}
  .PENDING{background:#fef3c7;color:#92400e;}
  .SENT{background:#dcfce7;color:#166534;}
  .FAILED{background:#fee2e2;color:#991b1b;}
  .icon-btn{border:none;background:none;cursor:pointer;font-size:14px;padding:4px 7px;border-radius:6px;}
  .icon-btn:hover{background:var(--accent-light);}
  .icon-btn.del:hover{background:#fee2e2;}
  .empty{padding:30px;text-align:center;color:var(--muted);font-size:13px;}
  .status-msg{margin-top:12px;font-size:13px;padding:10px 12px;border-radius:8px;display:none;}
  .status-msg.err{background:#fee2e2;color:#991b1b;display:block;}
  .status-msg.ok{background:#dcfce7;color:#166534;display:block;}
  .count{color:var(--muted);font-size:12px;font-weight:500;}
</style>
<script src="mediflow-nav.js"></script>
</head>
<body>
<header>
  <div class="left">
    <div class="icon">🔔</div>
    <div>
      <h1>Notification Service</h1>
      <p>MediFlow · Notification Management Microservice · port 8086</p>
    </div>
  </div>
  <select id="filterStatus" onchange="loadNotifications()">
    <option value="">All statuses</option>
    <option value="PENDING">Pending</option>
    <option value="SENT">Sent</option>
    <option value="FAILED">Failed</option>
  </select>
</header>
<main>
  <div class="grid">
    <div class="card">
      <h2>New Notification</h2>
      <form id="notifForm">
        <label>Patient ID</label>
        <input type="number" id="patientId" required placeholder="1">
        <div class="hint">Look up at localhost:8081/patients</div>
        <label>Type</label>
        <select id="type" required>
          <option value="">Select...</option>
          <option>EMAIL</option><option>SMS</option><option>SYSTEM</option>
        </select>
        <label>Subject</label>
        <input type="text" id="subject" required placeholder="Appointment Reminder">
        <label>Message</label>
        <textarea id="message" rows="4" required placeholder="Your appointment is scheduled for tomorrow at 10 AM."></textarea>
        <button type="submit" class="btn">Send Notification</button>
      </form>
      <div class="status-msg" id="statusMsg"></div>
    </div>

    <div class="card">
      <h2 style="display:flex;justify-content:space-between;align-items:center;">
        <span>Notifications</span><span class="count" id="countLabel"></span>
      </h2>
      <div class="list" id="list"></div>
      <div class="empty" id="emptyMsg" style="display:none">No notifications yet.</div>
    </div>
  </div>
</main>

<script>
const API = '/notifications';
const form = document.getElementById('notifForm');
const list = document.getElementById('list');
const statusMsg = document.getElementById('statusMsg');
const TYPE_ICON = {EMAIL:'📧', SMS:'💬', SYSTEM:'⚙️'};

function showMsg(text, ok){
  statusMsg.textContent = text;
  statusMsg.className = 'status-msg ' + (ok ? 'ok' : 'err');
  setTimeout(()=>{statusMsg.className='status-msg';}, 4000);
}

async function loadNotifications(){
  const filter = document.getElementById('filterStatus').value;
  const url = filter ? `${API}/status/${filter}` : API;
  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    document.getElementById('countLabel').textContent = data.length + (data.length===1?' notification':' notifications');
    document.getElementById('emptyMsg').style.display = data.length ? 'none':'block';
    list.innerHTML = data.map(n => `
      <div class="n-card">
        <div class="n-type">${TYPE_ICON[n.type]||'🔔'}</div>
        <div class="n-body">
          <div class="n-top">
            <span class="n-subject">${n.subject}</span>
            <span class="badge ${n.status}">${n.status}</span>
          </div>
          <div class="n-msg">${n.message}</div>
          <div class="n-meta">To: ${n.patientName || 'Patient #'+n.patientId} (${n.recipient||'—'}) · ${n.type} · ${n.createdAt ? new Date(n.createdAt).toLocaleString() : ''}</div>
          ${n.failureReason ? `<div class="n-meta" style="color:#991b1b">⚠ ${n.failureReason}</div>` : ''}
        </div>
        <div style="white-space:nowrap">
          ${n.status==='FAILED' ? `<button class="icon-btn" title="Resend" onclick="resend(${n.id})">🔁</button>` : ''}
          <button class="icon-btn del" title="Delete" onclick="deleteNotif(${n.id})">🗑️</button>
        </div>
      </div>`).join('');
  }catch(e){
    showMsg('Could not load notifications — is notification-service running? ('+e.message+')', false);
  }
}

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  const payload = {
    patientId: parseInt(document.getElementById('patientId').value),
    type: document.getElementById('type').value,
    subject: document.getElementById('subject').value,
    message: document.getElementById('message').value
  };
  try{
    const res = await fetch(API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
    if(!res.ok){
      const err = await res.json().catch(()=>({message:res.statusText}));
      throw new Error(err.message || 'Send failed');
    }
    showMsg('Notification created', true);
    form.reset();
    loadNotifications();
  }catch(e){ showMsg(e.message, false); }
});

async function resend(id){
  try{
    const res = await fetch(`${API}/${id}/resend`, {method:'PUT'});
    if(!res.ok) throw new Error('Resend failed');
    showMsg('Notification #'+id+' resent', true);
    loadNotifications();
  }catch(e){ showMsg(e.message, false); }
}

async function deleteNotif(id){
  if(!confirm('Delete notification #'+id+'?')) return;
  try{
    const res = await fetch(`${API}/${id}`, {method:'DELETE'});
    if(!res.ok) throw new Error('Delete failed');
    showMsg('Notification deleted', true);
    loadNotifications();
  }catch(e){ showMsg(e.message, false); }
}

loadNotifications();
</script>
</body>
</html>
